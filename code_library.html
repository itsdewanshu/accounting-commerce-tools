<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

            margin: 0;

<body class="min-h-screen flex flex-col items-center py-10 px-4 md:px-10">

    <!-- Rectangular Card Container with Scrollbar -->
    <div id="scroll-container" class="w-full max-w-5xl bg-[#1e293b] rounded-xl shadow-2xl border border-slate-700 overflow-auto custom-scrollbar relative" style="height: 75vh;">
        <!-- Canvas Container -->
        <div id="canvas-container" class="min-w-full min-h-full"></div>
    </div>

    <script>
        // 1. Data Structure defined from the provided syllabus
        const syllabusData = {
            name: "Monetary Theory and Banking",
            children: [
                {
                    name: "Unit I. Introduction",
                    children: [
                        { name: "Money: Definitions, Nature, Functions & Characteristics" },
                        { name: "Static and Dynamic Functions of Money" },
                        { name: "Importance in Capitalist and Socialist Economies" },
                        { name: "Evils of Money" },

                        { name: "Grasham's Law" },
                        { name: "Monetary Standard: Concept, Nature & Ideal Characteristics" }
                    ]
                },
                {
                    name: "Unit II. Paper Currency Standard",
                    children: [
                        { name: "Meaning, Nature, Merits and Demerits" },
                        { name: "Issue of Paper Money & Principles of Note-Issue" },
                        { name: "Bank Money: Creation of Credit Money & Limitations" },
                        { name: "Value of Money: Concept, Standard & Price Level" },
                        { name: "Measurement of Changes in Value of Money" },
                        {
                            name: "Monetary Theories",
                            children: [
                                { name: "Fisher's Quantity Theory" },
                                { name: "Cash Balance Theory (Cambridge Equation)" },
                                { name: "Saving and Investment Theory" },
                                { name: "Friedman's Theory" }
                            ]
                        }
                    ]
                },
                {
                    name: "Unit III. Commercial Banks",
                    children: [
                        { name: "Definition, Functions and Significance" },
                        { name: "Principles of Bank" },
                        { name: "Investments and Features of Bank Balance-sheet" },
                        { name: "Types of Banks" },
                        {
                            name: "Specialized Institutions",
                            children: [
                                { name: "RRBs: Functions and Workings" },
                                { name: "NABARD: Functions and Workings" }
                            ]
                        }
                    ]
                },
                {
                    name: "Unit IV. Central Bank",
                    children: [
                        { name: "Meaning, Nature, Significance and Functions" },
                        {
                            name: "Credit Control",
                            children: [
                                { name: "Quantitative Credit Control" },
                                { name: "Qualitative Credit Control" },
                                { name: "Limitations" }
                            ]
                        },
                        { name: "Recent Trends in Central Banking" },
                        {
                            name: "Reserve Bank of India (RBI)",
                            children: [
                                { name: "Management" },
                                { name: "Organisation" },
                                { name: "Functions" },
                                { name: "Achievements" }
                            ]
                        }
                    ]
                },
                {
                    name: "Texts / References",
                    children: [
                        { name: "1. Hajela, T.N., Money and Banking" },
                        { name: "2. Sundharam KPM, Banking: Theory, Law & Practice" },
                        { name: "3. M.R. Baye, D.W. Jansen, Money, Banking & Financial Markets" },
                        { name: "4. K.C. Sekhar: Banking - Theory and Practice" },
                        { name: "5. S.B. Gupta, Monetary Economics" },
                        { name: "6. M.L. Seth, Monetary Economics" },
                        { name: "7. R.R. Paul, Money, Banking & International Trade" }
                    ]
                }
            ]
        };

        // 2. Setup Dimensions and D3 Canvas
        const container = document.getElementById('canvas-container');
        const scrollContainer = document.getElementById('scroll-container');

        // Node Dimensions & Vertical Layout Constants
        const nodeWidth = 600; // Max width for foreignObject to prevent clipping
        const nodeHeight = 40;
        const indentSize = 40; // Horizontal shift per depth level
        const verticalSpacing = 52; // Vertical space between rows

        // Initialize plain SVG for native scrolling (Removed d3.zoom)
        const svg = d3.select("#canvas-container").append("svg")
            .attr("width", "100%")
            .attr("height", "100%");

        // Add padding group so elements don't touch the very edge
        const g = svg.append("g")
            .attr("transform", "translate(40, 40)");

        // 3. Hierarchy Setup (Removing d3.tree layout for manual vertical positioning)
        const root = d3.hierarchy(syllabusData);
        root.x0 = 0;
        root.y0 = 0;

        let i = 0; // Unique ID for nodes

        // Function to set initial collapsed state (Show Units, hide details)
        function collapse(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapse);
                d.children = null;
            }
        }

        // Initialize with depth > 0 collapsed (only Root and Units visible)
        root.children.forEach(collapse);

        // 4. Update Function
        function update(source) {
            
            // Calculate manual vertical layout
            const nodes = [];
            let index = 0;
            
            // Pre-order traversal to calculate X and Y based on visible hierarchy
            function traverse(node) {
                node.x = node.depth * indentSize;
                node.y = index * verticalSpacing;
                nodes.push(node);
                index++;
                if (node.children) {
                    node.children.forEach(traverse);
                }
            }
            traverse(root);

            // Dynamically update SVG size based on the expanded nodes to allow native scrolling
            const maxDepth = d3.max(nodes, d => d.x);
            const totalHeight = nodes.length * verticalSpacing;
            
            // Add margins (40px top/left from transform + extra for bottom/right padding)
            svg.attr("width", Math.max(container.clientWidth, maxDepth + nodeWidth + 80))
               .attr("height", Math.max(container.clientHeight, totalHeight + 80));

            // Get visible links (all descendants except root)
            const links = root.descendants().slice(1);
            
            // --- NODES ---
            const node = g.selectAll("g.node")
                .data(nodes, d => d.id || (d.id = ++i));

            const nodeEnter = node.enter().append("g")
                .attr("class", "node noselect")
                .attr("transform", d => `translate(${source.x0},${source.y0})`)
                .on("click", (event, d) => {
                    if (event.defaultPrevented) return;
                    if (d.children) {
                        d._children = d.children;
                        d.children = null;
                    } else {
                        d.children = d._children;
                        d._children = null;
                    }
                    update(d);
                });

            const fo = nodeEnter.append("foreignObject")
                .attr("width", nodeWidth)
                .attr("height", nodeHeight + 10) // slightly taller to avoid shadow clipping
                .attr("x", 0)
                .attr("y", 0);

            // Add the HTML card for the node
            fo.append("xhtml:div")
                .attr("class", "w-full h-full pointer-events-none flex items-start justify-start");

            // UPDATE Nodes
            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.transition()
                .duration(500)
                .attr("transform", d => `translate(${d.x},${d.y})`);

            // Re-render HTML content 
            nodeUpdate.select("div.pointer-events-none")
                .html(d => {
                    let bgClass = "";
                    let textClass = "";
                    let borderClass = "border border-transparent";
                    let iconClass = "text-white";

                    // Match image styles mapping to dark mode colors
                    if (d.depth === 0) {
                        bgClass = "bg-[#0f172a] shadow-md shadow-slate-900/50"; // Dark slate
                        textClass = "text-white font-bold tracking-wide uppercase";
                    } else if (d.depth === 1) {
                        bgClass = "bg-[#0ea5e9] shadow-md shadow-sky-900/30"; // Bright sky blue
                        textClass = "text-white font-bold tracking-wide uppercase text-sm";
                    } else {
                        bgClass = "bg-slate-800/40"; // Light outline equivalent
                        borderClass = "border border-slate-700";
                        textClass = "text-sky-300 font-medium text-sm"; // Blue text
                        iconClass = "text-sky-400";
                    }

                    const hasChildren = d.children || d._children;
                    const isExpanded = !!d.children;
                    const iconStr = isExpanded ? '−' : '+';

                    let iconHtml = '';
                    if (hasChildren) {
                        iconHtml = `<div class="w-4 h-4 flex-shrink-0 flex items-center justify-center font-bold text-lg ${iconClass} mr-2 mb-[2px]">${iconStr}</div>`;
                    } else {
                        // Spacer for alignment if no children
                        iconHtml = `<div class="w-4 h-4 flex-shrink-0 mr-2"></div>`;
                    }

                    return `
                        <div class="pointer-events-auto w-fit max-w-[550px] h-[${nodeHeight}px] py-2 px-3 flex items-center rounded-md ${bgClass} ${borderClass} hover:brightness-110 transition-all cursor-pointer">
                            ${iconHtml}
                            <span class="${textClass} truncate break-words whitespace-normal leading-tight">${d.data.name}</span>
                        </div>
                    `;
                });

            // EXIT Nodes
            const nodeExit = node.exit().transition()
                .duration(500)
                .attr("transform", d => `translate(${source.x},${source.y})`)
                .remove();
            nodeExit.select("foreignObject").style("opacity", 0);

            // --- LINKS ---
            // Function to generate L-shaped orthogonal lines
            function orthogonalPath(s, d) {
                // Assuming left padding of node is ~12px and icon is ~16px, center of icon is roughly at x=18
                const px = s.x + 18; 
                const py = s.y + nodeHeight; // Bottom of parent node
                const cx = d.x; // Left edge of child node
                const cy = d.y + (nodeHeight / 2); // Middle of child node vertically

                return `M ${px} ${py} 
                        L ${px} ${cy} 
                        L ${cx} ${cy}`;
            }

            const link = g.selectAll("path.link")
                .data(links, d => d.id);

            // ENTER Links
            const linkEnter = link.enter().insert("path", "g")
                .attr("class", "link")
                .attr("d", d => {
                    const px = source.x0 + 18;
                    const py = source.y0 + nodeHeight;
                    return `M ${px} ${py} L ${px} ${py} L ${px} ${py}`;
                });

            // UPDATE Links
            const linkUpdate = linkEnter.merge(link);
            linkUpdate.transition()
                .duration(500)
                .attr("d", d => orthogonalPath(d.parent, d));

            // EXIT Links
            link.exit().transition()
                .duration(500)
                .attr("d", d => {
                    const px = source.x + 18;
                    const py = source.y + nodeHeight;
                    return `M ${px} ${py} L ${px} ${py} L ${px} ${py}`;
                })
                .remove();

            // Store old positions for transition mapping
            nodes.forEach(d => {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }

        // Initial render
        update(root);

        // 5. Button Listeners
        document.getElementById('btn-reset').addEventListener('click', () => {
            // Native scroll reset instead of zoom
            scrollContainer.scrollTo({
                top: 0,
                left: 0,
                behavior: 'smooth'
            });
        });

        document.getElementById('btn-expand').addEventListener('click', () => {
            root.each(d => {
                if (d._children) {
                    d.children = d._children;
                    d._children = null;
                }
            });
            update(root);
        });

        document.getElementById('btn-collapse').addEventListener('click', () => {
            root.children.forEach(collapse);
            update(root);
            
            // Scroll back to top when collapsing all
            scrollContainer.scrollTo({
                top: 0,
                left: 0,
                behavior: 'smooth'
            });
        });
    </script>
</body>

      background-color: var(--blue-500);
      border: none;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;

      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);

      transform: scale(0.98);
    }

    /* PLAY SCREEN */
    #play-screen {
      background-color: #000000;
    }

    .control-bar {
      height: 56px;
      background-color: var(--bg-slate-900);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:active {
      background-color: var(--bg-slate-800);
    }

    .btn-pause {
      background-color: var(--blue-600);
      color: white;
      border: none;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-finish {
      color: #f43f5e;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Grid Layouts for Players */
    .players-grid {
      flex: 1;
      display: grid;
      gap: 4px;
      padding: 4px;
    }

    .players-grid.players-2 { grid-template-rows: 1fr 1fr; grid-template-columns: 1fr; }
    .players-grid.players-3 { grid-template-rows: 1fr 1fr 1fr; grid-template-columns: 1fr; }
    .players-grid.players-4 { grid-template-rows: 1fr 1fr; grid-template-columns: 1fr 1fr; }

    /* Player Card Slot */
    .player-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .player-card.active {
      opacity: 1;
      outline: 4px solid #ffffff;
      z-index: 10;
      transform: scale(1.01);
    }

    .player-card.paused {
      opacity: 1;
      outline: 2px dashed var(--yellow-400);

    .player-card.eliminated {
      opacity: 0.15;
      pointer-events: none;
      filter: grayscale(1);
    }

    /* Split Touch Zones */
    .touch-zones {
      position: absolute;
      inset: 0;
      display: flex;
    }

    .zone {
      flex: 1;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px;

    .zone-green {
      background-color: var(--emerald-500);
    }
    .zone-green:active { background-color: var(--emerald-400); }

    .zone-red {
      background-color: var(--rose-500);

    .zone-red:active { background-color: var(--rose-400); }

    .zone-text {
      color: rgba(255, 255, 255, 0.4);
      font-size: 48px;
      font-weight: 900;
    }

    .zone-green .zone-text { align-self: flex-start; }
    .zone-red .zone-text { align-self: flex-end; }

    /* Center Badge Info Overlay */
    .player-info-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .player-badge {
      background-color: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);

      padding: 14px 20px;
      border-radius: 20px;

      text-transform: uppercase;
      letter-spacing: 1px;

    /* FINISHED / LEADERBOARD SCREEN */

      align-items: center;

      max-width: 420px;

    .trophy-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .trophy-header svg {
      width: 64px;
      height: 64px;
      color: var(--yellow-400);
      margin-bottom: 8px;
    }

    .trophy-header h1 {
      font-size: 26px;
      font-weight: 800;
    }

    .ranking-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-radius: 14px;
      background-color: var(--bg-slate-700);
    }

    .ranking-item.winner {
      background-color: rgba(250, 204, 21, 0.15);
      border: 1px solid rgba(250, 204, 21, 0.4);
    }

    .ranking-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rank-number {
      font-size: 20px;
      font-weight: 900;
      color: #94a3b8;
      width: 24px;
    }

    .winner .rank-number {
      color: var(--yellow-400);
    }

    .rank-name {
      font-size: 17px;
      font-weight: 700;
    }

    .rank-subtext {
      font-size: 12px;
      color: #94a3b8;
    }

    .rank-score {
      font-size: 24px;
      font-weight: 900;
    }

    /* Animations */
    @keyframes pulse-warn {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    @keyframes pulse-turn {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <!-- 1. SETUP SCREEN -->
  <div id="setup-screen" class="screen active">
    <div class="setup-card">
      <div class="logo-container">
        <!-- SVG Clock Icon -->
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <h1>Pass & Find</h1>
      </div>

      <!-- Number of Players selection -->
      <div class="form-group">
        <label class="form-label">
          <!-- SVG Users Icon -->
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>

      </div>

      <button class="btn-primary" onclick="startGame()">
        <!-- Play SVG -->
        <svg fill="currentColor" width="16" height="16" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

      </button>

  <div id="play-screen" class="screen">

    <div class="control-bar">

        <svg fill="none" stroke="currentColor" stroke-width="2" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>

      <button id="btn-pause" class="btn-pause" onclick="togglePause()">
        <!-- Pause SVG -->
        <svg id="pause-icon" fill="currentColor" width="16" height="16" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        <span>PAUSE</span>
      </button>

      <button class="icon-btn btn-finish" onclick="manuallyEndGame()">
        <!-- Check SVG -->
        <svg fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Finish
      </button>
    </div>

    <!-- Interactive Grid Area -->
    <div id="players-grid" class="players-grid">
      <!-- Generated dynamically in JS -->
    </div>
  </div>

  <!-- 3. SCOREBOARD / LEADERBOARD SCREEN -->
  <div id="finish-screen" class="screen">
    <div class="leaderboard-card">
      <div class="trophy-header">
        <!-- Trophy SVG -->
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"></path><path d="M12 2a6.3 6.3 0 0 0-6 6.5C6 14.88 12 16 12 16s6-1.12 6-7.5A6.3 6.3 0 0 0 12 2z"></path></svg>
        <h1>Scoreboard</h1>
      </div>

      <div id="ranking-list" class="ranking-list">
        <!-- Generated dynamically in JS -->
      </div>

      <button class="btn-primary" onclick="toSetupScreen()">
        <!-- Return/Refresh SVG -->
        <svg fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
        PLAY AGAIN
      </button>
    </div>
  </div>

  <script>
    // Game state variables
    let gameStatus = 'setup'; // 'setup', 'playing', 'paused', 'finished'
    let numPlayers = 2;
    let players = [];
    let activeIdx = 0;
    let timerInterval = null;
    let increment = 5;

    // Changes input templates based on selected player count
    function setNumPlayers(num) {
      numPlayers = num;
      
      // Update toggle button states
      const buttons = document.querySelectorAll('.btn-toggle');
      buttons.forEach((btn, idx) => {
        if (idx + 2 === num) btn.classList.add('active');
        else btn.classList.remove('active');
      });

      // Update name input fields template
      const container = document.getElementById('team-inputs-container');
      container.innerHTML = '';
      for (let i = 0; i < num; i++) {
        container.innerHTML += `
          <input type="text" class="input-field team-name-input" placeholder="Team ${i + 1}" value="Team ${i + 1}">
        `;
      }
    }

    // Navigates back to the configuration screen
    function toSetupScreen() {
      clearInterval(timerInterval);
      gameStatus = 'setup';
      switchScreen('setup-screen');
    }

    // Helper to control UI visibility switching
    function switchScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // Main Game Initiation
    function startGame() {
      const minInput = parseInt(document.getElementById('start-min').value) || 5;
      const secInput = 0; // standard flat starting mins
      const totalSeconds = (minInput * 60) + secInput;
      increment = parseInt(document.getElementById('increment-sec').value) || 0;

      const nameInputs = document.querySelectorAll('.team-name-input');
      players = [];

      for (let i = 0; i < numPlayers; i++) {
        const nameVal = nameInputs[i].value.trim() || `Team ${i + 1}`;
        players.push({
          id: i,
          name: nameVal,
          time: totalSeconds,
          points: 0,
          isOut: false,
          receivedBonus: false
        });
      }

      activeIdx = 0;
      gameStatus = 'playing';
      switchScreen('play-screen');
      
      renderPlayersGrid();
      startTimer();
    }

    // Renders the responsive Split Interactive Grid
    function renderPlayersGrid() {
      const grid = document.getElementById('players-grid');
      grid.className = `players-grid players-${numPlayers}`;
      grid.innerHTML = '';

      players.forEach((p, idx) => {
        const isActive = gameStatus === 'playing' && idx === activeIdx;
        const isPaused = gameStatus === 'paused' && idx === activeIdx;
        
        let cardClass = "player-card";
        if (isActive) cardClass += " active";
        if (isPaused) cardClass += " paused";
        if (p.isOut) cardClass += " eliminated";

        const timeStr = formatTime(p.time);
        const warningClass = p.time < 30 ? 'warning' : '';

        grid.innerHTML += `
          <div id="card-${idx}" class="${cardClass}">
            <!-- Left & Right Split Interactive Touch Zones -->
            <div class="touch-zones">
              <button class="zone zone-green" onclick="handleAction(${idx}, true)" ${!isActive ? 'disabled' : ''}>
                <span class="zone-text">+3</span>
              </button>
              <button class="zone zone-red" onclick="handleAction(${idx}, false)" ${!isActive ? 'disabled' : ''}>
                <span class="zone-text">-2</span>
              </button>
            </div>

            <!-- Middle Information Overlay -->
            <div class="player-info-container">
              <div class="player-badge">
                <div class="player-name-label">${p.name}</div>
                <div id="timer-${idx}" class="player-timer ${warningClass}">${timeStr}</div>
                <div class="player-score-tag">Score: <span id="score-${idx}">${p.points}</span></div>
              </div>
              ${isActive ? '<div class="turn-prompt">YOUR TURN</div>' : ''}
            </div>
          </div>
        `;
      });
    }

    // Handles decrementing clocks every 100 milliseconds
    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (gameStatus !== 'playing') return;

        let activePlayer = players[activeIdx];
        if (!activePlayer || activePlayer.isOut) return;

        activePlayer.time -= 0.1;

        if (activePlayer.time <= 0) {
          activePlayer.time = 0;
          activePlayer.isOut = true;
          
          // Check if game is completely finished
          const survivors = players.filter(p => !p.isOut);
          if (survivors.length <= 1) {
            endGame();
          } else {
            passTurn();
          }
        } else {
          // Live update the DOM values to prevent unnecessary grid re-renders
          const timerEl = document.getElementById(`timer-${activeIdx}`);
          if (timerEl) {
            timerEl.textContent = formatTime(activePlayer.time);
            if (activePlayer.time < 30) {
              timerEl.classList.add('warning');
            }
          }
        }
      }, 100);
    }

    // Passes the turn clock cycle to the next active player
    function passTurn() {
      activeIdx = (activeIdx + 1) % numPlayers;
      while (players[activeIdx].isOut) {
        activeIdx = (activeIdx + 1) % numPlayers;
      }
      renderPlayersGrid();
    }

    // Score Addition/Reduction and turn passing action logic
    function handleAction(idx, isCorrect) {
      if (gameStatus !== 'playing' || idx !== activeIdx) return;

      const player = players[activeIdx];
      player.points += isCorrect ? 3 : -2;
      player.time += increment;

      passTurn();
    }

    // Pause/Resume Play clock toggle
    function togglePause() {
      const btn = document.getElementById('btn-pause');
      const icon = document.getElementById('pause-icon');
      const span = btn.querySelector('span');

      if (gameStatus === 'playing') {
        gameStatus = 'paused';
        span.textContent = 'RESUME';
        icon.innerHTML = `<polygon points="5 3 19 12 5 21 5 3"></polygon>`; // Play symbol
      } else if (gameStatus === 'paused') {
        gameStatus = 'playing';
        span.textContent = 'PAUSE';
        icon.innerHTML = `<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>`; // Pause symbol
      }
      renderPlayersGrid();
    }

    // Manual Game Completion action
    function manuallyEndGame() {
      endGame();
    }

    // Final calculations & awarding remaining time champion +10 points bonus
    function endGame() {
      clearInterval(timerInterval);
      gameStatus = 'finished';

      // Find the player with remaining time to grant the +10 points bonus
      const survivors = players.filter(p => !p.isOut && p.time > 0);
      if (survivors.length > 0) {
        // If there are multiple, find the one with the MOST time
        let maxTime = -1;
        let winnerIndex = -1;
        
        players.forEach((p, idx) => {
          if (!p.isOut && p.time > maxTime) {
            maxTime = p.time;
            winnerIndex = idx;
          }
        });

        if (winnerIndex !== -1) {
          players[winnerIndex].points += 10;
          players[winnerIndex].receivedBonus = true;
        }
      }

      // Display results on Leaderboard screen
      showLeaderboard();
    }

    // Organizes rank view structure
    function showLeaderboard() {
      const listContainer = document.getElementById('ranking-list');
      listContainer.innerHTML = '';

      // Sort descendingly by points, then by remaining time as fallback
      const sorted = [...players].sort((a, b) => {
        if (b.points !== a.points) return b.points - a.points;
        return b.time - a.time;
      });

      sorted.forEach((p, index) => {
        const isWinner = index === 0;
        listContainer.innerHTML += `
          <div class="ranking-item ${isWinner ? 'winner' : ''}">
            <div class="ranking-left">
              <span class="rank-number">#${index + 1}</span>
              <div>
                <span class="rank-name">${p.name}</span>
                <div class="rank-subtext">
                  Time left: ${formatTime(p.time)}
                  ${p.receivedBonus ? '<span style="color:var(--yellow-400); font-weight:bold; margin-left:8px;">+10 Bonus!</span>' : ''}
                </div>
              </div>
            </div>
            <span class="rank-score">${p.points}</span>
          </div>
        `;
      });

      switchScreen('finish-screen');
    }

    // Standard clock text processor helper
    function formatTime(seconds) {
      if (seconds <= 0) return "00:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }
  </script>
</body>

            --accent-color-glow: rgba(197, 168, 128, 0.15);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
        }

        /* Champagne Gold Accent */
        [data-theme="gold"] {
            --accent-color: #c5a880;
            --accent-color-rgb: 197, 168, 128;
            --accent-color-glow: rgba(197, 168, 128, 0.15);
        }

        /* Platinum Silver Accent */
        [data-theme="platinum"] {
            --accent-color: #cbd5e1;
            --accent-color-rgb: 203, 213, 225;
            --accent-color-glow: rgba(203, 213, 225, 0.15);
        }

        /* Rose Copper Accent */
        [data-theme="rose"] {
            --accent-color: #e0a996;
            --accent-color-rgb: 224, 169, 150;
            --accent-color-glow: rgba(224, 169, 150, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: 100vh;
        }

        /* Left Hand Customization Sidebar Panel */
        .sidebar {
            width: 400px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .brand-header i {
            color: var(--accent-color);
            font-size: 22px;
            transition: color 0.3s ease;
        }

        .brand-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Styling Form Control Elements */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-group input, .control-group textarea {
            background: #18181c;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 12px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .control-group input:focus, .control-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-color-glow);
        }

        /* Segmented Layout Selector Grid */
        .selector-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .selector-btn {
            background: #18181c;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 4px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .selector-btn:hover {
            border-color: var(--accent-color);
            color: #fff;
        }

        .selector-btn.active {
            background: var(--accent-color-glow);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .selector-btn i {
            font-size: 14px;
        }

        /* Color Theme Selector Dots */
        .theme-swatches {
            display: flex;
            gap: 12px;
            padding: 4px 0;
        }

        .swatch-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .swatch-btn::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background-color: var(--swatch-color);
        }

        .swatch-btn:hover {
            transform: scale(1.1);
        }

        .swatch-btn.active {
            border-color: #fff;
        }

        /* Sidebar CTA Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-gold {
            background: var(--accent-color);
            color: #0d0d0f;
        }

        .btn-gold:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-color);
            color: #fff;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 10.5px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Preview Workspace Panel */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d0d0f;
            padding: 40px 20px;
            overflow: auto;
            position: relative;
        }

        /* Scale wrapper to keep aspect ratio dynamically on resize */
        .canvas-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        /* ------------------ A4 DOCUMENT CONTAINER ------------------ */
        .a4-document {
            width: 500px;
            height: 707px; /* Strict A4 dynamic proportion scale */
            background: #09090b;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 1px 1px rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            position: relative;
            padding: 55px 45px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            flex-shrink: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Fine interior layout margin border */
        .inner-frame {
            position: absolute;
            inset: 22px;
            border: 1px solid rgba(var(--accent-color-rgb), 0.08);
            pointer-events: none;
            z-index: 2;
            transition: border-color 0.3s ease;
        }

        /* Ambient premium backdrop gradient glow */
        .a4-document::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, rgba(var(--accent-color-rgb), 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transition: background 0.3s ease;
        }

        /* ------------------ CONFIGURABLE TYPOGRAPHY LAYOUTS ------------------ */

        /* LAYOUT 1: Architectural Editorial (Mimicking sketch 1000051825.jpg) */
        .layout-architectural {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: flex-start;
            margin: auto 0;
            gap: 24px;
            width: 100%;
            height: 220px;
            z-index: 5;
        }

        .layout-architectural .vertical-accent-bar {
            width: 4px;
            background: linear-gradient(180deg, var(--accent-color) 0%, rgba(var(--accent-color-rgb), 0.15) 100%);
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(var(--accent-color-rgb), 0.25);
            transition: all 0.3s ease;
        }

        .layout-architectural .text-holder {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px 0;
            flex: 1;
        }

        .layout-architectural .level-1-block {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 5px;
            color: var(--accent-color);
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .layout-architectural .level-2-block {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            line-height: 1.25;
        }

        .layout-architectural .level-3-block {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-style: italic;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 14px;
            margin-top: 4px;
        }


        /* LAYOUT 2: Classic Centered (Premium Minimalist Look) */
        .layout-classic {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: auto 0;
            gap: 25px;
            width: 100%;
            z-index: 5;
        }

        .layout-classic .vertical-accent-bar {
            display: none; /* Removed in centered configuration */
        }

        .layout-classic .text-holder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
        }

        .layout-classic .level-1-block {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 6px;
            color: var(--accent-color);
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .layout-classic .level-2-block {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(var(--accent-color-rgb), 0.15);
            padding-bottom: 18px;
            width: 80%;
            transition: border-color 0.3s ease;
        }

        .layout-classic .level-3-block {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 300;
            max-width: 85%;
        }


        /* LAYOUT 3: Split Columns Grid (Previous layout concept without sphere) */
        .layout-columns {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin: auto 0;
            gap: 15px;
            width: 100%;
            z-index: 5;
        }

        .layout-columns .vertical-accent-bar {
            display: none;
        }

        .layout-columns .text-holder {
            display: contents; /* Allows direct card children layout styling */
        }

        .layout-columns .level-1-block,
        .layout-columns .level-2-block,
        .layout-columns .level-3-block {
            flex: 1;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0) 100%);
            border: 1px solid rgba(var(--accent-color-rgb), 0.12);
            border-radius: 3px;
            padding: 24px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 220px;
            transition: border-color 0.3s ease;
        }

        .layout-columns .level-1-block {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .layout-columns .level-2-block {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: #ffffff;
            line-height: 1.4;
        }

        .layout-columns .level-3-block {
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            font-style: italic;
            color: var(--text-secondary);
        }

        /* ------------------ SIGNATURE ELEMENT DESIGN ------------------ */
        .footer-signature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            z-index: 5;
        }

        .footer-signature .signature-text-block {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-signature .signature-name-val {
            font-family: 'Alex Brush', cursive;
            font-size: 26px;
            color: var(--accent-color);
            letter-spacing: 1px;
            text-transform: none;
            margin-top: -4px;
            transition: color 0.3s ease;
        }

        .footer-signature .signature-line {
            width: 45px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            transition: all 0.3s ease;
        }

        /* ------------------ SAVE MODAL OVERLAY ------------------ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(5, 5, 8, 0.98);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: #121215;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .modal-box h3 {
            font-family: 'Cinzel', serif;
            color: var(--accent-color);
            font-size: 15px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .modal-box p {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .preview-pane-container {
            width: 100%;
            height: 350px;
            background: #000;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        .rendered-img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-radius: 2px;
        }

        .modal-close-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-secondary);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
        }

        .modal-close-btn:hover {
            border-color: var(--accent-color);
            color: #fff;
        }

        /* ------------------ TOAST ALERTS ------------------ */
        .toast-banner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #18181c;
            border-left: 4px solid var(--accent-color);
            padding: 12px 24px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10001;
        }

        .toast-banner.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ------------------ RESPONSIVE WEBFLOW ENGINE ------------------ */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column-reverse; /* Places viewport preview on top on phone screens */
                height: auto;
                min-height: auto;
                overflow: visible;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-top: 1px solid var(--border-color);
                padding: 20px;
                height: auto;
            }
            .workspace {
                width: 100%;
                padding: 30px 15px;
                background-color: #08080a;
                height: auto;
                min-height: auto;
            }
        }

        /* ------------------ STRICT PRINT STYLES ------------------ */
        @media print {
            body {
                background: #000 !important;
                color: #fff !important;
                display: block;
                margin: 0;
                padding: 0;
            }
            .sidebar, .workspace::before, .toast-banner, .modal-overlay {
                display: none !important;
            }
            .workspace {
                padding: 0 !important;
                background: none !important;
                display: block !important;
                overflow: visible !important;
                height: auto !important;
                width: auto !important;
            }
            .a4-document {
                width: 210mm !important;
                height: 297mm !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                transform: none !important;
                background: #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                position: absolute;
                top: 0;
                left: 0;
                margin: 0;
                padding: 30mm 20mm !important;
            }
        }
    </style>
</head>
<body data-theme="gold">

<div class="app-container">

<script>
    // Mapping HTML elements
    const inputL1 = document.getElementById('inputL1');
    const inputL2 = document.getElementById('inputL2');
    const inputL3 = document.getElementById('inputL3');
    const inputSig = document.getElementById('inputSig');

    const renderL1 = document.getElementById('renderL1');
    const renderL2 = document.getElementById('renderL2');
    const renderL3 = document.getElementById('renderL3');
    const renderSig = document.getElementById('renderSig');

    const layoutWrapper = document.getElementById('layoutWrapper');
    const canvasContainer = document.getElementById('canvasContainer');
    const docCanvas = document.getElementById('docCanvas');
    const exportBtn = document.getElementById('exportBtn');
    
    const saveModal = document.getElementById('saveModal');
    const renderedImg = document.getElementById('renderedImg');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');

    // Real-time synchronization
    function syncContent() {
        renderL1.textContent = inputL1.value || "LEVEL I";
        renderL2.textContent = inputL2.value || "LEVEL II";
        renderL3.textContent = inputL3.value || "LEVEL III";
        renderSig.textContent = inputSig.value || "dewanshu Rai";
    }

    // Attach sync event listeners
    inputL1.addEventListener('input', syncContent);
    inputL2.addEventListener('input', syncContent);
    inputL3.addEventListener('input', syncContent);
    inputSig.addEventListener('input', syncContent);

    // Auto-scale layout to perfectly fit any display viewport size
    function scalePreview() {
        if (!canvasContainer || !docCanvas) return;

        let containerWidth = canvasContainer.clientWidth;
        
        // Fallback for sandboxed mobile views reporting 0 width
        if (!containerWidth || containerWidth < 50) {
            containerWidth = window.innerWidth - 40;
        }

        // Clip maximum scale bounding box
        if (containerWidth > 500) {
            containerWidth = 500;
        }

        const standardWidth = 500;
        const scaleFactor = containerWidth / standardWidth;

        docCanvas.style.transform = `scale(${scaleFactor})`;
        docCanvas.style.transformOrigin = 'top center';

        // Adjust layout container boundary height dynamically so layout flow works beautifully
        canvasContainer.style.height = `${707 * scaleFactor}px`;
    }

    // Responsive listeners
    window.addEventListener('resize', scalePreview);
    
    // Run initialization
    syncContent();
    setTimeout(scalePreview, 150);

    // Layout switcher configuration
    function setDocumentLayout(mode) {
        // Reset classes
        layoutWrapper.className = '';
        
        // Toggle active buttons states
        document.getElementById('btnLayoutArch').classList.remove('active');
        document.getElementById('btnLayoutClassic').classList.remove('active');
        document.getElementById('btnLayoutColumns').classList.remove('active');

        if (mode === 'architectural') {
            layoutWrapper.classList.add('layout-architectural');
            document.getElementById('btnLayoutArch').classList.add('active');
        } else if (mode === 'classic') {
            layoutWrapper.classList.add('layout-classic');
            document.getElementById('btnLayoutClassic').classList.add('active');
        } else if (mode === 'columns') {
            layoutWrapper.classList.add('layout-columns');
            document.getElementById('btnLayoutColumns').classList.add('active');
        }
        
        // Refresh scale parameters
        scalePreview();
    }

    // Accent theme management
    function setAccentTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        
        // Toggle swatch highlighting state
        document.querySelectorAll('.swatch-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`theme-${theme}-btn`).classList.add('active');
    }

    // High resolution canvas image renderer
    function renderAsHighResImage() {
        // Temporarily reset scaling matrix for high density 1:1 image outputs
        const previousTransform = docCanvas.style.transform;
        docCanvas.style.transform = 'none';

        exportBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Converting...`;
        exportBtn.disabled = true;

        const captureOptions = {
            scale: 2.5, // Crisp 2.5x retina-ready quality export
            backgroundColor: "#09090b",
            useCORS: true,
            allowTaint: true,
            logging: false
        };

        if (typeof html2canvas === 'undefined') {
            displayToast("Error: Renderer failed to load. Please reload the page.");
            docCanvas.style.transform = previousTransform;
            exportBtn.innerHTML = `<i class="fa-solid fa-image"></i> Save as Image`;
            exportBtn.disabled = false;
            return;
        }

        html2canvas(docCanvas, captureOptions).then(canvas => {
            try {
                const imgData = canvas.toDataURL('image/png');
                
                // Mount rendered output to save modal
                renderedImg.src = imgData;
                saveModal.classList.add('active');

                displayToast("Image rendered successfully!");
            } catch (err) {
                console.error(err);
                displayToast("Rendering failed. Use native print PDF function.");
            } finally {
                // Restore scaled preview
                docCanvas.style.transform = previousTransform;
                exportBtn.innerHTML = `<i class="fa-solid fa-image"></i> Save as Image`;
                exportBtn.disabled = false;
            }
        }).catch(err => {
            console.error(err);
            docCanvas.style.transform = previousTransform;
            exportBtn.innerHTML = `<i class="fa-solid fa-image"></i> Save as Image`;
            exportBtn.disabled = false;
            displayToast("Browser restricted canvas capture locally.");
        });
    }

    function closeSaveModal() {
        saveModal.classList.remove('active');
    }

    // Display Toast banner notifications
    function displayToast(msg) {
        toastMsg.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }
</script>

</body>
</html>
            </template>
        </div>

        <!-- 📝 CONTAINER 4 -->
        <div class="file-container" 
             data-id="2" 
             data-title="Blank Canvas Project" 
             data-description="A clean starting point for a new HTML/Tailwind project."
             data-tags="Template, Empty"
             data-date="Oct 24, 2023">
            <template class="raw-html">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blank Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <h1 class="text-4xl font-bold text-gray-400">Blank Canvas</h1>
</body>
</html>
            </template>
        </div> 
        <!-- ➕ TO ADD A NEW FILE, COPY THE BLOCK ABOVE AND PASTE IT HERE -->
        <!-- ➕ TO ADD A NEW FILE, COPY THE BLOCK ABOVE AND PASTE IT HERE -->

    </div>
    <!-- ======================================================================= -->

    <script>
        // 1. Data Parsing
        const projects = [];
        const fileContainers = document.querySelectorAll('.file-container');
        
        fileContainers.forEach((container) => {
            const id = container.getAttribute('data-id');
            const title = container.getAttribute('data-title') || 'Untitled Project';
            const description = container.getAttribute('data-description') || 'No description provided.';
            const tagsAttr = container.getAttribute('data-tags') || '';
            const date = container.getAttribute('data-date') || '';
            
            // USING <template> INSTEAD OF <script> TO PREVENT NESTED SCRIPT ERRORS
            const templateTag = container.querySelector('template.raw-html');
            const htmlContent = templateTag ? templateTag.innerHTML.trim() : '<h1>Error: No HTML Found</h1>';

            const tags = tagsAttr.split(',').map(t => t.trim()).filter(t => t.length > 0);

            projects.push({ id, title, description, tags, date, htmlContent });
        });

        // 2. UI Elements
        const grid = document.getElementById('projects-grid');
        const searchInput = document.getElementById('search-input');
        const emptyState = document.getElementById('empty-state');
        const resultsCount = document.getElementById('results-count');
        
        const modal = document.getElementById('viewer-modal');
        const iframe = document.getElementById('viewer-iframe');
        const modalTitle = document.getElementById('viewer-title');
        const btnClose = document.getElementById('btn-close');
        const btnCopy = document.getElementById('btn-copy');

        let currentActiveProject = null;

        // 3. Render Function
        function renderGrid(dataToRender) {
            grid.innerHTML = ''; // Clear current grid

            if (dataToRender.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                resultsCount.innerText = "0 files found";
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            
            resultsCount.innerText = `Showing ${dataToRender.length} file${dataToRender.length !== 1 ? 's' : ''}`;

            dataToRender.forEach(project => {
                const card = document.createElement('div');
                card.className = "bg-dark-card border border-dark-border rounded-xl p-5 hover:-translate-y-1 hover:shadow-xl hover:shadow-sky-900/20 hover:border-dark-hover transition-all duration-300 flex flex-col group cursor-pointer";
                
                // Click event to open viewer
                card.onclick = () => openViewer(project);

                const tagsHtml = project.tags.map(tag => 
                    `<span class="px-2.5 py-1 rounded-full bg-slate-800 text-xs font-medium text-slate-300 border border-slate-700">${tag}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 rounded-lg bg-slate-800/50 flex items-center justify-center border border-slate-700 group-hover:bg-sky-900/30 group-hover:border-sky-700/50 group-hover:text-sky-400 transition-colors">
                            <i class="ph-duotone ph-browser text-2xl text-slate-400 group-hover:text-sky-400 transition-colors"></i>
                        </div>
                        ${project.date ? `<span class="text-xs text-slate-500 font-medium">${project.date}</span>` : ''}
                    </div>
                    <h3 class="text-lg font-bold text-slate-100 mb-2 group-hover:text-white">${project.title}</h3>
                    <p class="text-sm text-slate-400 mb-6 flex-grow line-clamp-3">${project.description}</p>
                    <div class="flex flex-wrap gap-2 mt-auto">
                        ${tagsHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Search/Filter Logic
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = projects.filter(p => {
                return p.title.toLowerCase().includes(query) || 
                       p.description.toLowerCase().includes(query) || 
                       p.tags.some(t => t.toLowerCase().includes(query));
            });
            renderGrid(filtered);
        });

        // 5. Viewer Logic
        function openViewer(project) {
            currentActiveProject = project;
            modalTitle.innerText = project.title;
            
            // Set the HTML content of the iframe using srcdoc
            iframe.srcdoc = project.htmlContent;
            
            // Show Modal
            modal.classList.remove('pointer-events-none', 'opacity-0');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeViewer() {
            modal.classList.add('pointer-events-none', 'opacity-0');
            document.body.style.overflow = 'auto'; // Restore scrolling
            
            // Clear iframe to stop audio/video/scripts when closed
            setTimeout(() => {
                iframe.srcdoc = '';
                currentActiveProject = null;
            }, 300); // Wait for fade out animation
        }

        btnClose.addEventListener('click', closeViewer);
        
        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('opacity-0')) {
                closeViewer();
            }
        });

        // Copy Code Button
        btnCopy.addEventListener('click', () => {
            if (currentActiveProject) {
                // Create a temporary textarea to copy from
                const textarea = document.createElement('textarea');
                textarea.value = currentActiveProject.htmlContent;
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    
                    // Visual feedback
                    const originalText = btnCopy.innerHTML;
                    btnCopy.innerHTML = `<i class="ph-bold ph-check text-green-400"></i><span class="hidden sm:inline text-green-400">Copied!</span>`;
                    btnCopy.classList.replace('bg-slate-700', 'bg-slate-800');
                    
                    setTimeout(() => {
                        btnCopy.innerHTML = originalText;
                        btnCopy.classList.replace('bg-slate-800', 'bg-slate-700');
                    }, 2000);
                } catch (err) {
                    alert('Failed to copy code. Your browser might not support this feature.');
                } finally {
                    document.body.removeChild(textarea);
                }
            }
        });

        // 6. Initial Render
        renderGrid(projects);

    </script>
</body>
</html>
